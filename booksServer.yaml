AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: An AWS Serverless Application Model (SAM) template describing your function.
Resources:
  booksServer:
    Type: AWS::Serverless::Function
    Properties:
      Architectures:
        - x86_64
      CodeUri: ./src
      Description: ''
      Environment:
        Variables:
          Open_Library_URL: https://openlibrary.org/
          LIMIT: '5'
          LANG: en
      EphemeralStorage:
        Size: 512
      Handler: index.handler
      LoggingConfig:
        LogFormat: Text
        LogGroup: /aws/lambda/booksServer
      MemorySize: 512
      PackageType: Zip
      RecursiveLoop: Terminate
      Runtime: nodejs24.x
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto
      SnapStart:
        ApplyOn: None
      Tags: {}
      Timeout: 60
      Tracing: PassThrough
      Events:
        Trigger1Event:
          Type: HttpApi
          Properties:
            Method: ANY
            Path: /MyResource
        Trigger2Event:
          Type: HttpApi
          Properties:
            Method: ANY
            Path: /books
        Trigger3Event:
          Type: HttpApi
          Properties:
            Method: ANY
            Path: /booksServer
